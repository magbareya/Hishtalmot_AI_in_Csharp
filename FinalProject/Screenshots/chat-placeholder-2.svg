  <text x="200" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#111827">(45*12)/3 = 180 and 72 fahrenheit = 22.2222 celsius.</text>
  <rect x="120" y="550" width="780" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
